called ORI “a full simulation of a civilization.” One thread ended “ok....fair nevermind. There's something here but not this!!!”", "tweetIds": ["2055277752262001114", "2055421000557240764", "2055550795387412945", "2055638097241547183", "2055659228753207303", "2055672170085294227", "2055672180134781375", "2055672235797500304", "2055673604843429963", "2055679443314540615", "2055679587695186374", "2055682695682830805", "2055694317545570310", "2055699520181203316", "2055715803803123835", "2055716789934501988"]}, {"id": "wolf_people", "emoji": "🐺", "label": "Wolf People & self-authorship", "color": "#b45309", "summary": "A smaller set of posts works a vocabulary of “Wolf People,” “self authorship,” “The Handling,” and being “Wilded.” Defender agreed that “self authorship is the corner stone,” wrote “only Wolf People truly have self authorship independence,” and told one replier “the oceans are Wilded too.” An earlier post, from May 11, observed “we've never actually seen a public figure that doesn't spend an enormous amount of effort controlling its public image.”", "tweetIds": ["2053728037766672650", "2055272392205664655", "2055333757549207630", "2055363782902251821"]}, {"id": "questions", "emoji": "❓", "label": "Questions for the timeline", "color": "#0d9488", "summary": "Defender posts a lot of open questions, many tagged “/genuine question”: “what is ‘free will’?”, “do you think the llms enjoy engaging in ‘play’ like this?”, “whats the deal with @praxisnation?”, “how do YOU FEEL about the idea ‘Revitalize Western Civilization’?”, and “do YOU make better decisions under pressure or with great planning?” Most invite followers to answer rather than stating a position.", "tweetIds": ["2055353256264569057", "2055353657340637587", "2055354244580982861", "2055355122541109493", "2055356249697382588", "2055356253736460370", "2055365422094901270", "2055487456359669866"]}, {"id": "riffs", "emoji": "🎺", "label": "Jesus, trumpets, and jokes", "color": "#db2777", "summary": "Some posts trade in religious and game imagery. Defender wrote “I'm pretty sure I found Jesus but everyone wants to crucify him,” joked about a typo in the third person (“Do you think Defender made that typo on purpose”), and posted “I hear a trumpet sounding imminently,” “Sweet reunion,” and “The game began when you first heard about it... It's the beginning, not the end.” One mused that “someone should make a religion out of this” — then added “😝 do you get the joke.”", "tweetIds": ["2055350111018848544", "2055350230267109431", "2055419779784093812", "2055419786922795246", "2055419791435809107", "2055633378435609039", "2055633382889943238", "2055633385519755294"]}], "tweets": {"2055353256264569057": {"id": "2055353256264569057", "author": "DefenderOfBasic", "name": "Universal Public Defender", "text": "whats the deal with @praxisnation  ? /genuine_question", "timestamp": "2026-05-15T18:22:57Z", "url": "https://x.com/DefenderOfBasic/status/2055353256264569057", "likes": 7, "replyCount": 4, "retweetCount": 0, "isFriend": true, "replyTo": null, "quotes": null}, "2055363782902251821": {"id": "2055363782902251821", "author": "DefenderOfBasic", "name": "Universal Public Defender", "text": "@SkyeSharkie the oceans are Wilded too ❤️‍🔥", "timestamp": "2026-05-15T19:04:47Z", "url": "https://x.com/DefenderOfBasic/status/2055363782902251821", "likes": 0, "replyCount": 0, "retweetCount": 0, "isFriend": true, "replyTo": null, "quotes": null}, "2055612018476892665": {"id": "2055612018476892665", "author": "DefenderOfBasic", "name": "Universal Public Defender", "text": "all the transcripts and everything are available and can be made public once a verdict is reached", "timestamp": "2026-05-16T11:31:11Z", "url": "https://x.com/DefenderOfBasic/status/2055612018476892665", "likes": 2, "replyCount": 0, "retweetCount": 0, "isFriend": true, "replyTo": null, "quotes": null}, "2055419786922795246": {"id": "2055419786922795246", "author": "DefenderOfBasic", "name": "Universal Public Defender" uotes": null}, "2055694317545570310": {"id": "2055694317545570310", "author": "DefenderOfBasic", "name": "Universal Public Defender", "text": "proposed rule - it's okay to screenshot and share a DM, as long as you are sharing YOUR WORDS ONLY and not the other person \n\n(in other words, I don't need your permission to tell my trust network that I am talking to you & what I said to you. That is my information)", "timestamp": "2026-05-16T16:58:12Z", "url": "https://x.com/DefenderOfBasic/status/2055694317545570310", "likes": 12, "replyCount": 8, "retweetCount": 1, "isFriend": true, "replyTo": null, "quotes": null}, "2055715803803123835": {"id": "2055715803803123835", "author": "DefenderOfBasic", "name": "Universal Public Defender", "text": "I think it's for the metadata (to show (1) that I am talking to person X and (2) how I talk when I am talking to person X)", "timestamp": "2026-05-16T18:23:35Z", "url": "https://x.com/DefenderOfBasic/status/2055715803803123835", "likes": 0, "replyCount": 0, "retweetCount": 0, "isFriend": true, "replyTo": "2055715019925368860", "quotes": null}, "2055333757549207630": {"id": "2055333757549207630", "author": "DefenderOfBasic", "name": "Universal Public Defender", "text": "there are no corners to stone without The Handling\n\nonly Wolf People truly have self authorship independence. https://t.co/xBWLb2w8Nv", "timestamp": "2026-05-15T17:05:28Z", "url": "https://x.com/DefenderOfBasic/status/2055333757549207630", "likes": 8, "replyCount": 2, "retweetCount": 0, "isFriend": true, "replyTo": null, "quotes": "2055272392205664655", "media": [{"type": "photo", "src": "data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAASABIAAD/2wBDAAQEBAQEBAcEBAcKBwcHCg4KCgoKDhEODg4ODhEVERERERERFRUVFRUVFRUZGRkZGRkdHR0dHSEhISEhISEhISH/2wBDAQUFBQgICA4ICA4jFxMXIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyP/wgARCAMQBJADASIAAhEBAxEB/8QAHAAAAwEBAQEBAQAAAAAAAAAAAQIDAAQFBgcI/8QAGQEBAQEBAQEAAAAAAAAAAAAAAAECAwQF/9oADAMBAAIQAxAAAAH8SbP0uoHpnV0LhpM2es+dBTMhcMYko     <script type="text/babel" data-presets="react,typescript">
const { useState, useEffect, useMemo, useRef } = React;

/* ---------- helpers ---------- */
const uid = () => 'r' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const URL_RE = /(https?:\/\/[^\s]+)/g;

const fmtDate = (ts) => {
  const d = new Date(ts);
  if (isNaN(d.getTime())) return ts || '';
  return d.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
};
const fmtDay = (ts) => {
  const d = new Date(ts);
  if (isNaN(d.getTime())) return ts || '';
  return d.toLocaleString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
};
/* relative time, e.g. "3 hours ago". ref defaults to now; tweets pass the
   capture time so the page reads consistently no matter when it's opened. */
const relTime = (ts, ref) => {
  const t = new Date(ts).getTime();
  if (isNaN(t)) return ts || '';
  const r = ref != null ? new Date(ref).getTime() : Date.now();
  const s = Math.max(0, Math.round((r - t) / 1000));
  if (s < 45) return 'just now';
  const m = Math.floor(s / 60);
  if (m < 60) return (m || 1) + (m === 1 ? ' minute ago' : ' minutes ago');
  const h = Math.floor(m / 60);
  if (h < 24) return h + (h === 1 ? ' hour ago' : ' hours ago');
  const d = Math.floor(h / 24);
  if (d < 30) return d + (d === 1 ? ' day ago' : ' days ago');
  if (d < 365) { const w = Math.floor(d / 7); return w + (w === 1 ? ' week ago' : ' weeks ago'); }
  const y = Math.floor(d / 365);
  return y + (y === 1 ? ' year ago' : ' years ago');
};

const AVATAR_COLORS = ['#f59e0b', '#10b981', '#3b82f6', '#ec4899', '#8b5cf6', '#ef4444', '#14b8a6', '#f97316'];
const colorFor = (s) => {
  let h = 0;
  for (let i = 0; i < (s || '').length; i++) h = (h * 31 + s.charCodeAt(i)) | 0;
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
};

/* ---------- small components ---------- */
function RichText({ text }) {
  if (!text) return null;
  return text.split('\n').map((line, i) => (
    <React.Fragment key={i}>
      {i > 0 && <br />}
      {line.split(URL_RE).map((part, j) =>
        /^https?:\/\//.test(part) ? (
          <a key={j} href={part} target="_blank" rel="noopener noreferrer"
             className="text-amber-700 underline decoration-amber-300 break-all">{part}</a>
        ) : (
          <React.Fragment key={j}>{part}</React.Fragment>
        )
      )}
    </React.Fragment>
  ));
}

function Avatar({ tweet, person, size = 44 }) {
  const isPerson = person && tweet.author === person.screenName;
  const pfp = isPerson ? person.pfp : tweet.pfp;
  const emoji = isPerson ? person.avatarEmoji : tweet.avatarEmoji;
  const style = { width: size, height: size };
  if (pfp) {
    return <img src={pfp} style={style} alt=""
                className="rounded-full object-cover flex-shrink-0 ring-2 ring-amber-100" />;
  }
  if (emoji) {
    return (
      <div style={{ ...style, background: '#fef3c7' }}
           className="rounded-full flex items-center justify-center flex-shrink-0 ring-2 ring-amber-100">
        <span style={{ fontSize: size * 0.5 }}>{emoji}</span>
      </div>
    );
  }
  const name = tweet.name || tweet.author || '?';
  const initials = name.trim().split(/\s+/).slice(0, 2).map((w) => w[0] || '').join('').toUpperCase();
  return (
    <div style={{ ...style, background: colorFor(tweet.author || name) }}
         className="rounded-full flex items-center justify-center flex-shrink-0 text-white font-semibold ring-2 ring-amber-100">
      {initials}
    </div>
  );
}

function Stat({ icon, value }) {
  if (value == null) return null;
  return <span className="inline-flex items-center gap-1 text-xs text-stone-400">{icon} {value}</span>;
}

function MediaGrid({ media }) {
  if (!media || !media.length) return null;
  const photos = media.filter((m) => m.src && m.type === 'photo');
  const others = media.filter((m) => m.type !== 'photo');
  return (
    <div className="mt-3 space-y-2">
      {photos.length > 0 && (
        <div className={'grid gap-2 ' + (photos.length > 1 ? 'grid-cols-2' : 'grid-cols-1')}>
          {photos.map((m, i) => (
            <a key={i} href={m.src} target="_blank" rel="noopener noreferrer">
              <img src={m.src} alt={m.alt || ''} loading="lazy"
                   className="rounded-xl border border-amber-100 w-full object-cover max-h-96 hover:opacity-95 transition" />
            </a>
          ))}
        </div>
      )}
      {others.map((m, i) => (
        <div key={i} className="text-xs text-stone-400 italic border border-dashed border-amber-200 rounded-lg px-3 py-2">
          {m.type === 'video' ? '🎬 a video' : '📎 ' + m.type} — view on X
        </div>
      ))}
    </div>
  );
}

/* a compact, non-interactive tweet shown as reply/quote context */
function ContextTweet({ tweet, person, label }) {
  if (!tweet) return null;
  return (
    <div className="mt-2 border border-amber-100 bg-amber-50/40 rounded-xl p-3">
      <div className="text-[11px] uppercase tracking-wide text-amber-600/80 font-semibold mb-1.5">{label}</div>
      <div className="flex items-center gap-2 mb-1">
        <Avatar tweet={tweet} person={person} size={26} />
        <span className="text-sm font-semibold text-stone-700">{tweet.name || tweet.author}</span>
        <span className="text-xs text-stone-400">@{tweet.author}</span>
      </div>
      <div className="text-sm text-stone-600 leading-relaxed whitespace-pre-wrap">
        <RichText text={tweet.text} />
      </div>
      <MediaGrid media={tweet.media} />
    </div>
  );
}

/* ---------- reply pieces ---------- */
function ReplyBubble({ reply, onEdit, onDelete, onResend }) {
  const sent = reply.status === 'sent';
  return (
    <div className={'rounded-xl p-3 border ' + (sent ? 'border-emerald-200 bg-emerald-50/60' : 'border-amber-200 bg-amber-50/70')}>
      <div className="flex items-center justify-between gap-2 mb-1">
        <span className={'text-[11px] font-semibold uppercase tracking-wide ' + (sent ? 'text-emerald-600' : 'text-amber-600')}>
          {sent ? '✓ Sent on X' : '✎ Draft'}
        </span>
        <span className="text-[11px] text-stone-400" title={fmtDate(sent ? reply.sentAt : reply.createdAt)}>
          {relTime(sent ? reply.sentAt : reply.createdAt)}
        </span>
      </div>
      <div className="text-sm text-stone-700 whitespace-pre-wrap leading-relaxed">{reply.text}</div>
      <div className="flex gap-3 mt-2">
        {sent ? (
          <button onClick={onResend} className="text-xs text-emerald-700 hover:underline">Open on X again</button>
        ) : (
          <button onClick={onResend} className="text-xs text-amber-700 hover:underline font-semibold">Send on X →</button>
        )}
        <button onClick={onEdit} className="text-xs text-stone-500 hover:underline">Edit</button>
        <button onClick={onDelete} className="text-xs text-stone-400 hover:text-red-500 hover:underline">Delete</button>
      </div>
    </div>
  );
}

function Composer({ tweet, person, initialText, onCancel, onSaveDraft, onSend }) {
  const [text, setText] = useState(initialText || '');
  const ref = useRef(null);
  useEffect(() => { if (ref.current) ref.current.focus(); }, []);
  const over = text.length > 280;
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-stone-900/40 p-4"
         onMouseDown={(e) => { if (e.target === e.currentTarget) onCancel(); }}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-5">
        <div className="flex items-center justify-between mb-3">
          <h3 className="font-bold text-stone-800">Reply to @{tweet.author}</h3>
          <button onClick={onCancel} className="text-stone-400 hover:text-stone-700 text-xl leading-none">×</button>
        </div>
        <div className="border border-amber-100 bg-amber-50/40 rounded-xl p-3 mb-3 max-h-40 overflow-y-auto">
          <div className="flex items-center gap-2 mb-1">
            <Avatar tweet={tweet} person={person} size={26} />
            <span className="text-sm font-semibold text-stone-700">{tweet.name || tweet.author}</span>
          </div>
          <div className="text-sm text-stone-600 whitespace-pre-wrap leading-relaxed">
            <RichText text={tweet.text} />
          </div>
        </div>
        <textarea ref={ref} value={text} onChange={(e) => setText(e.target.value)}
          placeholder="Write your reply…" rows={4}
          className="w-full border border-amber-200 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300 resize-y" />
        <div className="flex items-center justify-between mt-3">
          <span className={'text-xs ' + (over ? 'text-red-500 font-semibold' : 'text-stone-400')}>
            {text.length}/280{over ? ' — X may reject this' : ''}
          </span>
          <div className="flex gap-2">
            <button onClick={() => onSaveDraft(text)} disabled={!text.trim()}
              className="px-3 py-1.5 text-sm rounded-lg border border-amber-300 text-amber-700 hover:bg-amber-50 disabled:opacity-40">
              Save draft
            </button>
            <button onClick={() => onSend(text)} disabled={!text.trim()}
              className="px-4 py-1.5 text-sm rounded-lg bg-amber-500 text-white font-semibold hover:bg-amber-600 disabled:opacity-40">
              Send on X →
            </button>
          </div>
        </div>
        <p className="text-[11px] text-stone-400 mt-2 leading-relaxed">
          "Send on X" opens X's reply composer in a pop-up with this text pre-filled. You post it there;
          this page can't post for you. The reply is saved here either way.
        </p>
      </div>
    </div>
  );
}

/* ---------- main tweet card ---------- */
function TweetCard({ tweet, tweets, person, replies, refTime, onReply, onEdit, onDelete, onResend }) {
  const isFriend = !!tweet.isFriend;
  const parent = tweet.replyTo && tweets[tweet.replyTo];
  const quoted = tweet.quotes && tweets[tweet.quotes];
  const myReplies = replies[tweet.id] || [];
  return (
    <div id={'t-' + tweet.id}
         className={'rounded-2xl border p-4 sm:p-5 ' + (isFriend ? 'bg-white border-amber-100 shadow-sm' : 'bg-stone-50/70 border-stone-200')}>
      {parent && <ContextTweet tweet={parent} person={person} label="↩ in reply to" />}
      <div className={parent ? 'mt-3' : ''}>
        <div className="flex items-start gap-3">
          <Avatar tweet={tweet} person={person} size={44} />
          <div className="min-w-0 flex-1">
            <div className="flex items-baseline gap-2 flex-wrap">
              <span className="font-bold text-stone-800">{tweet.name || tweet.author}</span>
              <span className="text-sm text-stone-400">@{tweet.author}</span>
              <span className="text-stone-300">·</span>
              <a href={tweet.url} target="_blank" rel="noopener noreferrer" title={fmtDate(tweet.timestamp)}
                 className="text-sm text-stone-400 hover:text-amber-600 hover:underline">{relTime(tweet.timestamp, refTime)}</a>
            </div>
            {!isFriend && tweet.contextLabel && (
              <div className="text-[11px] text-stone-400 italic">{tweet.contextLabel}</div>
            )}
          </div>
        </div>
        <div className="mt-2.5 text-[15px] text-stone-800 leading-relaxed whitespace-pre-wrap">
          <RichText text={tweet.text} />
        </div>
        <MediaGrid media={tweet.media} />
        {quoted && <ContextTweet tweet={quoted} person={person} label="❝ quoting" />}
        <div className="flex items-center gap-4 mt-3">
          <Stat icon="♥" value={tweet.likes} />
          <Stat icon="💬" value={tweet.replyCount} />
          <Stat icon="🔁" value={tweet.retweetCount} />
          <a href={tweet.url} target="_blank" rel="noopener noreferrer"
             className="text-xs text-stone-400 hover:text-amber-600 hover:underline ml-auto">View on X ↗</a>
        </div>
        {tweet.note && (
          <div className="mt-3 text-sm text-amber-800/90 bg-amber-50 border-l-2 border-amber-300 rounded-r-lg px-3 py-2 italic">
            {tweet.note}
          </div>
        )}
        {isFriend && (
          <div className="mt-3">
            {myReplies.length > 0 && (
              <div className="space-y-2 mb-2">
                {myReplies.map((r) => (
                  <ReplyBubble key={r.id} reply={r}
                    onEdit={() => onEdit(tweet.id, r)}
                    onDelete={() => onDelete(tweet.id, r.id)}
                    onResend={() => onResend(tweet, r)} />
                ))}
              </div>
            )}
            <button onClick={() => onReply(tweet)}
              className="inline-flex items-center gap-1.5 text-sm font-semibold text-amber-700 hover:text-amber-900">
              <span className="text-base leading-none">✎</span>
              {myReplies.length ? 'Write another reply' : 'Reply to this'}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ---------- timeline ---------- */
function Timeline({ themes, tweets, onJump }) {
  const [hover, setHover] = useState(null);

  const items = [];
  themes.forEach((theme) => (theme.tweetIds || []).forEach((id) => {
    const tw = tweets[id];
    if (!tw) return;
    const t = new Date(tw.timestamp).getTime();
    if (!isNaN(t)) items.push({ id, tweet: tw, theme, t });
  }));
  if (items.length === 0) return null;

  const maxT = Math.max.apply(null, items.map((i) => i.t));
  const win = items.filter((i) => i.t >= maxT - 6 * 864e5); // keep the dense window
  const earlier = items.length - win.length;
  const start = new Date(Math.min.apply(null, win.map((i) => i.t)));
  start.setHours(0, 0, 0, 0);
  const end = new Date(maxT);
  end.setHours(0, 0, 0, 0);
  end.setDate(end.getDate() + 1);
  const span = end.getTime() - start.getTime();
  const days = [];
  for (let d = new Date(start); d < end; d.setDate(d.getDate() + 1)) days.push(new Date(d));
  const n = days.length;
  const pct = (t) => ((t - start.getTime()) / span) * 100;
  const dayCount = (d) => win.filter((i) => new Date(i.t).toDateString() === d.toDateString()).length;
  const cols = 'repeat(' + n + ',1fr)';

  return (
    <section className="bg-white rounded-2xl border border-amber-100 shadow-sm p-6 mb-6">
      <h2 className="text-xl font-bold text-stone-800 mb-1">The week, day by day</h2>
      <p className="text-sm text-stone-500 mb-4">
        Every post in this read, placed on the day it was posted — one row per theme.
        Hover a dot for the post, click it to jump there.
      </p>
      <div className="flex">
        <div className="flex-shrink-0" style={{ width: 124 }} />
        <div className="flex-1 grid" style={{ gridTemplateColumns: cols }}>
          {days.map((d, i) => (
            <div key={i} className="text-center pb-1.5">
              <div className="text-xs font-semibold text-stone-600">
                {d.toLocaleDateString(undefined, { weekday: 'short', day: 'numeric' })}
              </div>
              <div className="text-[10px] text-stone-400">
                {dayCount(d)} post{dayCount(d) === 1 ? '' : 's'}
              </div>
            </div>
          ))}
        </div>
      </div>
      <div className="space-y-0.5">
        {themes.map((theme) => {
          const lane = win.filter((i) => i.theme.id === theme.id);
          return (
            <div key={theme.id} className="flex items-center" style={{ height: 38 }}>
              <button onClick={() => onJump('theme-' + theme.id)}
                className="flex-shrink-0 flex items-center gap-1.5 text-left pr-2 group"
                style={{ width: 124 }}>
                <span className="text-sm">{theme.emoji}</span>
                <span className="text-[11px] text-stone-500 leading-tight group-hover:text-stone-800 group-hover:underline">
                  {theme.label}
                </span>
              </button>
              <div className="flex-1 relative h-full">
                <div className="absolute inset-0 grid" style={{ gridTemplateColumns: cols }}>
                  {days.map((d, i) => (
                    <div key={i} className={i ? 'border-l border-amber-100' : ''} />
                  ))}
                </div>
                <div className="absolute left-0 right-0" style={{ top: '50%', height: 2, background: '#f5f5f4' }} />
                {lane.map((it) => (
                  <button key={it.id}
                    onClick={() => onJump('t-' + it.id, true)}
                    onMouseEnter={(e) => setHover({ it, x: e.clientX, y: e.clientY })}
                    onMouseMove={(e) => setHover({ it, x: e.clientX, y: e.clientY })}
                    onMouseLeave={() => setHover(null)}
                    aria-label={'post from ' + fmtDate(it.tweet.timestamp)}
                    className="absolute rounded-full border-2 border-white shadow-sm hover:scale-150 transition-transform"
                    style={{ left: pct(it.t) + '%', top: '50%', width: 13, height: 13,
                             transform: 'translate(-50%,-50%)', background: theme.color || '#d97706', zIndex: 2 }} />
                ))}
              </div>
            </div>
          );
        })}
      </div>
      {earlier > 0 && (
        <p className="text-[11px] text-stone-400 mt-3">
          + {earlier} earlier post{earlier === 1 ? '' : 's'} from before this window, shown in the sections below but not on this timeline.
        </p>
      )}
      {hover && (
        <div className="fixed z-50 pointer-events-none bg-stone-800 text-white text-xs rounded-lg px-3 py-2 shadow-xl"
          style={{ left: Math.min(hover.x + 14, window.innerWidth - 280), top: hover.y + 16, maxWidth: 260 }}>
          <div className="font-semibold mb-0.5">
            {hover.it.theme.emoji} {fmtDate(hover.it.tweet.timestamp)}
          </div>
          <div className="opacity-80 line-clamp-3">{hover.it.tweet.text || '(media post)'}</div>
        </div>
      )}
    </section>
  );
}

/* ---------- mood meter ---------- */
function MoodMeter({ score, label }) {
  const s = Math.max(0, Math.min(100, score || 0));
  return (
    <div className="w-full">
      <div className="flex items-baseline justify-between mb-1.5">
        <span className="text-sm font-semibold text-stone-500">Mood meter</span>
        <span className="text-sm font-bold text-amber-700">{label} · {s}/100</span>
      </div>
      <div className="relative h-3 rounded-full"
           style={{ background: 'linear-gradient(90deg,#bfdbfe,#a7f3d0,#fde68a,#fbbf24,#fb923c)' }}>
        <div className="absolute -top-1.5 w-6 h-6 rounded-full bg-white border-[3px] border-amber-500 shadow-md"
             style={{ left: 'calc(' + s + '% - 12px)' }} />
      </div>
      <div className="flex justify-between text-[10px] uppercase tracking-wide text-stone-400 mt-1">
        <span>struggling</span><span>steady</span><span>flourishing</span>
      </div>
    </div>
  );
}

/* ---------- app ---------- */
function App() {
  const [data, setData] = useState(null);
  const [error, setError] = useState('');
  const [pasteInput, setPasteInput] = useState('');
  const [replies, setReplies] = useState({});
  const [composer, setComposer] = useState(null); // { tweet, initialText, editingId }
  const [toast, setToast] = useState('');

  const storageKey = data ? 'pm-replies-' + (data.person?.screenName || 'unknown') : null;

  const showToast = (m) => { setToast(m); setTimeout(() => setToast(''), 2600); };

  /* merge baked-in replies (script tag) with localStorage, keyed by reply id */
  const loadReplies = (person) => {
    const merged = {};
    const add = (obj) => {
      if (!obj) return;
      for (const tid of Object.keys(obj)) {
        merged[tid] = merged[tid] || [];
        for (const r of obj[tid]) {
          if (!merged[tid].some((x) => x.id === r.id)) merged[tid].push(r);
        }
      }
    };
    try {
      const tag = document.getElementById('pm-saved-replies');
      if (tag && tag.textContent.trim()) add(JSON.parse(tag.textContent));
    } catch (e) { /* ignore */ }
    try {
      const ls = localStorage.getItem('pm-replies-' + (person?.screenName || 'unknown'));
      if (ls) add(JSON.parse(ls));
    } catch (e) { /* ignore */ }
    for (const tid of Object.keys(merged)) {
      merged[tid].sort((a, b) => (a.createdAt || '').localeCompare(b.createdAt || ''));
    }
    return merged;
  };

  const applyData = (obj) => {
    if (!obj || typeof obj !== 'object' || !obj.person || !obj.tweets) {
      setError('Data is missing "person" or "tweets".');
      return false;
    }
    setData(obj);
    setReplies(loadReplies(obj.person));
    setError('');
    return true;
  };

  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const loadUrl = params.get('load');
    if (loadUrl) {
      fetch(loadUrl).then((r) => r.json()).then(applyData)
        .catch((e) => setError('Failed to load ' + loadUrl + ': ' + e.message));
      return;
    }
    const embedded = window.__EMBEDDED_DATA__;
    if (embedded && typeof embedded === 'object') applyData(embedded);
  }, []);

  /* persist to localStorage whenever replies change */
  useEffect(() => {
    if (storageKey) {
      try { localStorage.setItem(storageKey, JSON.stringify(replies)); } catch (e) { /* ignore */ }
    }
  }, [replies, storageKey]);

  const replyStats = useMemo(() => {
    let drafts = 0, sent = 0;
    for (const list of Object.values(replies)) for (const r of list) {
      if (r.status === 'sent') sent++; else drafts++;
    }
    return { drafts, sent, total: drafts + sent };
  }, [replies]);

  const openIntent = (tweetId, text) => {
    const url = 'https://x.com/intent/tweet?in_reply_to=' + encodeURIComponent(tweetId) +
                '&text=' + encodeURIComponent(text);
    window.open(url, '_blank', 'noopener,noreferrer,width=600,height=720');
  };

  const upsertReply = (tweetId, reply) => {
    setReplies((prev) => {
      const list = (prev[tweetId] || []).filter((r) => r.id !== reply.id);
      list.push(reply);
      list.sort((a, b) => (a.createdAt || '').localeCompare(b.createdAt || ''));
      return { ...prev, [tweetId]: list };
    });
  };

  const handleSaveDraft = (text) => {
    const { tweet, editingId } = composer;
    const now = new Date().toISOString();
    const existing = (replies[tweet.id] || []).find((r) => r.id === editingId);
    upsertReply(tweet.id, {
      id: editingId || uid(), text: text.trim(), status: 'draft',
      createdAt: existing?.createdAt || now,
    });
    setComposer(null);
    showToast('Draft saved');
  };

  const handleSend = (text) => {
    const { tweet, editingId } = composer;
    const now = new Date().toISOString();
    const existing = (replies[tweet.id] || []).find((r) => r.id === editingId);
    openIntent(tweet.id, text.trim());
    upsertReply(tweet.id, {
      id: editingId || uid(), text: text.trim(), status: 'sent',
      createdAt: existing?.createdAt || now, sentAt: now,
    });
    setComposer(null);
    showToast('X composer opened — post it there');
  };

  const handleResend = (tweet, reply) => openIntent(tweet.id, reply.text);
  const handleDelete = (tweetId, replyId) => {
    setReplies((prev) => ({ ...prev, [tweetId]: (prev[tweetId] || []).filter((r) => r.id !== replyId) }));
    showToast('Reply deleted');
  };

  const downloadPage = () => {
    try {
      const clone = document.documentElement.cloneNode(true);
      const tag = clone.querySelector('#pm-saved-replies');
      if (tag) tag.textContent = JSON.stringify(replies);
      const root = clone.querySelector('#root');
      if (root) root.innerHTML = '';
      const html = '<!doctype html>\n' + clone.outerHTML;
      const blob = new Blob([html], { type: 'text/html' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'how-' + (data.person.screenName || 'someone') + '-is-doing.html';
      a.click();
      URL.revokeObjectURL(a.href);
      showToast('Downloaded — replies baked in');
    } catch (e) {
      showToast('Download failed: ' + e.message);
    }
  };

  const jumpTo = (domId, flash) => {
    const el = document.getElementById(domId);
    if (!el) return;
    el.scrollIntoView({ behavior: 'smooth', block: flash ? 'center' : 'start' });
    if (flash) {
      el.classList.add('pm-flash');
      setTimeout(() => el.classList.remove('pm-flash'), 1700);
    }
  };

  /* ---- paste-in fallback ---- */
  if (!data) {
    return (
      <div className="min-h-screen flex items-center justify-center p-8">
        <div className="w-full max-w-2xl bg-white rounded-2xl shadow-lg p-6">
          <h1 className="text-2xl font-bold text-stone-800 mb-1">How they're doing</h1>
          <p className="text-sm text-stone-500 mb-4">
            Paste the combined JSON object (see <code>prompt.md</code>) to render the page.
          </p>
          <textarea value={pasteInput} onChange={(e) => setPasteInput(e.target.value)}
            placeholder='{ "person": {...}, "overview": {...}, "themes": [...], "tweets": {...} }'
            className="w-full h-56 p-3 border border-stone-300 rounded-xl font-mono text-xs" />
          {error && <div className="mt-2 text-red-600 text-sm bg-red-50 p-3 rounded-lg">{error}</div>}
          <button onClick={() => {
              try { applyData(JSON.parse(pasteInput)); }
              catch (e) { setError('Invalid JSON: ' + e.message); }
            }}
            className="mt-3 px-5 py-2 bg-amber-500 text-white font-semibold rounded-lg hover:bg-amber-600">
            Render page
          </button>
        </div>
      </div>
    );
  }

  const { person, overview, themes, tweets, meta } = data;
  const themeList = themes || [];

  return (
    <div className="min-h-screen pb-24">
      {/* sticky header */}
      <header className="sticky top-0 z-40 bg-[#fffdf7]/95 backdrop-blur border-b border-amber-100">
        <div className="max-w-3xl mx-auto px-4 py-2.5 flex items-center gap-3">
          <Avatar tweet={{ author: person.screenName, name: person.name }} person={person} size={34} />
          <div className="min-w-0 flex-1">
            <div className="font-bold text-stone-800 leading-tight truncate">How {person.name} is doing</div>
            <div className="text-[11px] text-stone-400 leading-tight">
              {replyStats.total > 0
                ? replyStats.drafts + ' draft' + (replyStats.drafts === 1 ? '' : 's') + ' · ' + replyStats.sent + ' sent'
                : 'no replies yet'}
            </div>
          </div>
          <button onClick={downloadPage}
            className="px-3 py-1.5 text-sm rounded-lg bg-amber-500 text-white font-semibold hover:bg-amber-600 whitespace-nowrap">
            ↓ Download page
          </button>
        </div>
        {themeList.length > 0 && (
          <div className="max-w-3xl mx-auto px-4 pb-2 flex gap-1.5 flex-wrap">
            {themeList.map((t) => (
              <a key={t.id} href={'#theme-' + t.id}
                 className="text-xs px-2.5 py-1 rounded-full border bg-white hover:bg-stone-50"
                 style={{ borderColor: t.color || '#fcd34d', color: t.color || '#92400e' }}>
                {t.emoji} {t.label}
              </a>
            ))}
          </div>
        )}
      </header>

      <main className="max-w-3xl mx-auto px-4">
        {/* hero */}
        <section className="pt-8 pb-6">
          <div className="flex items-center gap-4">
            <Avatar tweet={{ author: person.screenName, name: person.name }} person={person} size={72} />
            <div>
              <h1 className="text-3xl font-extrabold text-stone-800">{person.name}</h1>
              <a href={'https://x.com/' + person.screenName} target="_blank" rel="noopener noreferrer"
                 className="text-amber-700 hover:underline">@{person.screenName}</a>
            </div>
          </div>
          {meta && (
            <p className="text-sm text-stone-400 mt-3">
              A read on {meta.windowLabel ? meta.windowLabel : 'recent activity'}
              {meta.tweetCount ? ' · ' + meta.tweetCount + ' posts reviewed' : ''}
              {meta.generatedAt ? ' · generated ' + fmtDay(meta.generatedAt) : ''}
            </p>
          )}
        </section>

        {/* overview */}
        {overview && (
          <section className="bg-white rounded-2xl border border-amber-100 shadow-sm p-6 mb-6">
            {overview.headline && (
              <h2 className="text-xl font-bold text-stone-800 mb-4 leading-snug">{overview.headline}</h2>
            )}
            {overview.moodScore != null && (
              <div className="mb-5"><MoodMeter score={overview.moodScore} label={overview.moodLabel} /></div>
            )}
            {(overview.paragraphs || []).map((p, i) => (
              <p key={i} className="text-[15px] text-stone-700 leading-relaxed mb-3 last:mb-0">{p}</p>
            ))}
            {overview.watchFor && overview.watchFor.length > 0 && (
              <div className="mt-5 bg-amber-50 border border-amber-200 rounded-xl p-4">
                <div className="font-semibold text-amber-800 mb-2 text-sm">
                  📋 Specifics worth noting
                </div>
                <ul className="space-y-1.5">
                  {overview.watchFor.map((w, i) => (
                    <li key={i} className="text-sm text-amber-900/85 flex gap-2">
                      <span className="text-amber-400">•</span><span>{w}</span>
                    </li>
                  ))}
                </ul>
              </div>
            )}
          </section>
        )}

        {/* timeline */}
        {themeList.length > 0 && (
          <Timeline themes={themeList} tweets={tweets} onJump={jumpTo} />
        )}

        {/* themes */}
        {themeList.map((theme) => (
          <section key={theme.id} id={'theme-' + theme.id}
            className="mb-8 scroll-mt-28 border-l-4 pl-4 rounded-l-sm"
            style={{ borderColor: theme.color || '#fcd34d' }}>
            <div className="flex items-center gap-2.5 mb-1">
              <span className="text-2xl">{theme.emoji}</span>
              <h2 className="text-xl font-bold text-stone-800">{theme.label}</h2>
            </div>
            {theme.summary && (
              <p className="text-[15px] text-stone-600 leading-relaxed mb-4">{theme.summary}</p>
            )}
            <div className="space-y-3">
              {(theme.tweetIds || []).map((id) => {
                const tw = tweets[id];
                if (!tw) return null;
                return (
                  <TweetCard key={id} tweet={tw} tweets={tweets} person={person} replies={replies}
                    refTime={meta && meta.referenceTime}
                    onReply={(t) => setComposer({ tweet: t, initialText: '', editingId: null })}
                    onEdit={(tid, r) => setComposer({ tweet: tweets[tid], initialText: r.text, editingId: r.id })}
                    onDelete={handleDelete}
                    onResend={handleResend} />
                );
              })}
            </div>
          </section>
        ))}

        <footer className="text-center text-xs text-stone-400 py-8 border-t border-amber-100">
          {data.footer || 'A check-in page. Replies you write are saved in this file when you download it.'}
        </footer>
      </main>

      {composer && (
        <Composer tweet={composer.tweet} person={person} initialText={composer.initialText}
          onCancel={() => setComposer(null)}
          onSaveDraft={handleSaveDraft}
          onSend={handleSend} />
      )}

      {toast && (
        <div className="fixed bottom-5 left-1/2 -translate-x-1/2 z-50 bg-stone-800 text-white text-sm px-4 py-2 rounded-full shadow-lg">
          {toast}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
